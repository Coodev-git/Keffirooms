<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KeffiRooms — Reset Password</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/landing.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0A0A0A;--bg2:#111;--bg3:#161616;--t1:#fff;--t3:rgba(255,255,255,.45);--border:rgba(255,255,255,.08);}
[data-theme="light"]{--bg:#F4F7F6;--bg2:#fff;--bg3:#EEF2F0;--t1:#0A1816;--t3:#2D4A45;--border:rgba(13,31,28,.12);}
.email-hint {
  margin-top:12px; padding:12px 14px; border-radius:var(--r);
  background:rgba(13,148,136,.1); border:1px solid rgba(13,148,136,.25);
  font-size:.76rem; color:var(--teal-l); line-height:1.55;
}
</style>
</head>
<body>
<div class="auth-screen on">
  <div class="auth-nav">
    <button class="auth-back" onclick="goBackFromReset()">
      <span class="material-symbols-rounded ms" style="font-size:.88rem;">arrow_back</span> Back
    </button>
  </div>
  <div class="auth-sheet" style="margin-top:24px;">
    <div class="sheet-title">Reset Password</div>
    <div class="sheet-sub" id="reset-sub">Enter the email you used to register. We will send a 6-digit code there.</div>

    <div id="step-request">
      <div class="fg"><label>Registration email</label>
        <input class="fi" type="email" id="reset-email" placeholder="your@email.com" autocomplete="off" spellcheck="false">
      </div>
      <button class="btn-primary" id="btn-request-reset" onclick="requestReset()">Send Reset Code</button>
    </div>

    <div id="step-otp" style="display:none;">
      <div class="fg">
        <label for="reset-otp">6-digit reset code</label>
        <input class="fi" type="text" id="reset-otp" placeholder="123456" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
      </div>
      <div id="email-hint" class="email-hint" style="display:none;"></div>
      <button class="btn-primary" onclick="verifyOtp()">Verify Code</button>
      <div class="sw-link" style="margin-top:12px;">
        <a onclick="backToRequest()">Use a different email</a>
      </div>
    </div>

    <div id="step-new" style="display:none;">
      <div class="fg"><label>New Password</label>
        <input class="fi" type="password" id="reset-password" placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="submitReset()">Update Password</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
const resetRole = new URLSearchParams(location.search).get('role') === 'agent' ? 'agent' : 'seeker';
const loginPage = resetRole === 'agent' ? 'auth-agent.html' : 'auth-seeker.html';
const accountLabel = resetRole === 'agent' ? 'agent' : 'student';
const urlToken = new URLSearchParams(location.search).get('token');
let resetEmail = '';

document.getElementById('reset-sub').textContent =
  `Enter the ${accountLabel} email you registered with. We will send a 6-digit code there.`;

if (urlToken) {
  document.getElementById('step-request').style.display = 'none';
  document.getElementById('step-new').style.display = 'block';
  document.getElementById('reset-sub').textContent = 'Choose a new password (min 8 characters).';
  window.resetToken = urlToken;
}

function goBackFromReset() {
  goPage(loginPage);
}

function showResetOtpStep(email) {
  resetEmail = email;
  document.getElementById('step-request').style.display = 'none';
  document.getElementById('step-otp').style.display = 'block';
  document.getElementById('reset-sub').textContent = `Enter the 6-digit code sent to ${email}. Check spam if you do not see it.`;
  const hint = document.getElementById('email-hint');
  if (hint) {
    hint.style.display = 'block';
    hint.innerHTML = '<span class="material-symbols-rounded ms" style="font-size:.9rem;vertical-align:-3px;">mail</span> Code sent by email only.';
  }
  const otp = document.getElementById('reset-otp');
  if (otp) {
    otp.value = '';
    setTimeout(() => {
      otp.focus();
      otp.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }
}

function backToRequest() {
  document.getElementById('step-request').style.display = 'block';
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('reset-sub').textContent =
    `Enter the ${accountLabel} email you registered with. We will send a 6-digit code there.`;
}

async function requestReset() {
  const email = document.getElementById('reset-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) return showToast('Enter your registration email');
  const btn = document.getElementById('btn-request-reset');
  if (btn) btn.disabled = true;
  try {
    const r = await API.auth.forgotPassword(email, resetRole);
    showToast(r.message || 'If that account exists, check your email');
    if (r.delivered || r.emailDelivered) {
      showResetOtpStep(r.identifier || email);
    }
  } catch (e) {
    showToast(e.message || 'Could not send reset code');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function verifyOtp() {
  const code = document.getElementById('reset-otp')?.value.replace(/\D/g, '');
  if (!code || code.length < 6) return showToast('Enter the 6-digit code');
  if (!resetEmail) return showToast('Request a new code first');
  try {
    const r = await API.auth.verifyResetOtp(resetEmail, code, resetRole);
    window.resetToken = r.resetToken;
    document.getElementById('step-request').style.display = 'none';
    document.getElementById('step-otp').style.display = 'none';
    document.getElementById('step-new').style.display = 'block';
    document.getElementById('reset-sub').textContent = 'Code verified — choose a new password.';
    showToast(r.message || 'Code verified');
    document.getElementById('reset-password')?.focus();
  } catch (e) { showToast(e.message || 'Invalid code'); }
}

async function submitReset() {
  const password = document.getElementById('reset-password').value;
  if (!password || password.length < 8) return showToast('Password min 8 chars');
  try {
    await API.auth.resetPassword(window.resetToken || urlToken, password);
    showToast('Password updated — sign in');
    setTimeout(() => goPage(loginPage), 1500);
  } catch (e) { showToast(e.message || 'Could not update password'); }
}

document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  clearAuthLoginFields();
  document.getElementById('reset-otp')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verifyOtp();
  });
  document.getElementById('reset-password')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitReset();
  });
});
</script>
</body>
</html>
