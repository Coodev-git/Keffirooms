# Render Blueprint — https://dashboard.render.com/select-repo?type=blueprint
# Uses Neon PostgreSQL + Cloudinary via dashboard env vars (no secrets in this file).

services:
  - type: web
    name: keffirooms
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run db:migrate
    startCommand: npm run db:seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GOOGLE_DEV_LOGIN
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: CLOUDINARY_LISTING_FOLDER
        value: keffirooms/listings
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      # Neon + Cloudinary + admin — set in Render dashboard only:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CLIENT_URL
        sync: false
